<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Funcionarios</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            <nav>
                <a href = "/portal"> voltar para o Portal </a>             
            </nav>
            <h1>Lista de funcionarios da empresa</h1>
        </header>
        <main>
            <table>
                <tr>
                    <th> id </th>
                    <th> nome </th>
                    <th> cargo </th>
                    <th> departamento </th>
                    <th> email</th>
                    <th> dataContratacao </th>                    
                </tr>
                <tr  th:each = "f : ${lista}">
                    <td th:text=" ${f.id}"></td>
                    <td th:text="${f.nome}"></td>
                    <td th:text="${f.cargo}"></td>
                    <td th:text="${f.departamento}"></td>
                    <td th:text="${f.email}"></td>
                    <td th:text="${f.dataContratacao}"></td>                    
                </tr>
            </table>
        </main>
    </body>
</html>
